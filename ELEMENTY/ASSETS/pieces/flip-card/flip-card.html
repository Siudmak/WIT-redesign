<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 700px;
}

.flip-card {
  background-color: transparent;
  width: 222.5px;
  height: 300px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  text-align: center;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flip-card:hover .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  background-color: #bbb;
  color: black;
}

.flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 15px;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
  background-color: #900000;
  color: white;
  transform: rotateY(180deg);
}

.fc-name-tag {
	height: 47px;
  width: 180px; 
  border-radius: 10px;
}

#nt_front{
  position: absolute;
	background-color: #FFF;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 8px;
  top: 220px;
  left: 13px;
}

#nt_front .name{
	font-style: bold;
}

#nt_back{
	backgroud-color: #FFF
}
</style>
</head>
<body>
<div class="flip-card">
  <div class="flip-card-inner">
    <div class="flip-card-front">
    <div class="fc-name-tag" id="nt_front">
       <div class="fc-nt-title">dr</div>
       <div class="fc-nt-name">Jan Placeholder</div>
    </div> 
    </div>
    <div class="flip-card-back">
    	<div class="flip-card-info">
      		<div class="fc-name-tag" id="nt_back">
            	<div class="fc-nt-title">dr</div>
                <div class="fc-nt-name">Jan Placeholder</div>
            </div> 
      		<p>Lorem ipsum dolor sit amet, 
      		consectetur adipiscing elit,
      		sed do eiusmod tempor incididunt ut 
      		labore et dolore magna aliqua. 
      		Ut enim ad minim veniam.</p>
      </div>
    </div>
  </div>
</div>

</body>
</html>
